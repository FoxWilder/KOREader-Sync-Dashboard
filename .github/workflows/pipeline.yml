name: "Release & Automation"

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  packages: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed for deep meaningful release notes

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # Fix: We now have package-lock.json, so cache should work. 
          # But for the very first run in the real repo, we might need to be careful.
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --include=dev

      - name: Build Application
        run: npm run build
        continue-on-error: true

      - name: Set Release Version
        id: vars
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            # Prepend date and high-precision time for strict sorting
            echo "tag=rolling-$(date +'%Y%m%d-%H%M%S')-${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT
          fi

      - name: Prepare Release ZIP
        run: |
          mkdir -p release
          # Core files
          cp -r package.json package-lock.json setup.ps1 migrate.py check_environment.py server.ts drizzle.config.ts tsconfig.json vite.config.ts index.html release/
          # Source and styling
          cp -r src release/
          # Build artifacts
          [ -d dist ] && cp -r dist release/ || true
          cd release && zip -r ../wilder-sync-${{ steps.vars.outputs.tag }}.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: Wilder Sync v1.1.0-Release (${{ steps.vars.outputs.tag }})
          files: wilder-sync-${{ steps.vars.outputs.tag }}.zip
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Packages
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" > ~/.npmrc
          npm publish || echo "Package already exists or version not bumped"
        continue-on-error: true

      - name: Setup Pages
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: actions/deploy-pages@v4
